syntax = "proto3";
package pyth_lazer;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// Shared type definitions used by both state.proto and governance_instruction.proto.

message Channel {
    oneof kind {
        google.protobuf.Duration rate = 1;
        google.protobuf.Empty real_time = 2;
    }
}

// Access token authentication configuration for a publisher.
message PublisherAccessToken {
    oneof token {
        // SHA-256 hash of the plaintext access token (32 bytes).
        bytes sha256_hash = 1;
    }
}

enum FeedState {
    // Default value. Feeds in this state are not available to consumers.
    // `COMING_SOON` feeds are expected to become stable in the future.
    COMING_SOON = 0;
    // A fully available feed.
    STABLE = 1;
    // Inactive feeds are not available to consumers.
    // `INACTIVE` feeds are not expected to become stable again.
    INACTIVE = 2;
    // `BETA` feed is only available to permissioned consumers.
    BETA = 3;
}

// Feed kind determines the set of data fields available in the feed.
// It also determines the kind of data accepted from publishers for this feed
// (`PriceUpdate` or `FundingRateUpdate`).
enum FeedKind {
    // Fields: price, best_bid_price, best_ask_price
    PRICE = 0;
    // Fields: price, rate.
    FUNDING_RATE = 1;
}

// Market session type
enum MarketSession {
    REGULAR = 0;
    PRE_MARKET = 1;
    POST_MARKET = 2;
    OVER_NIGHT = 3;
    CLOSED = 4;
}

// Trading status type
enum TradingStatus {
    TRADING_STATUS_OPEN = 0;
    TRADING_STATUS_CLOSED = 1;
    TRADING_STATUS_HALTED = 2;
    TRADING_STATUS_CORP_ACTION = 3;
}

// Publisher key type.
enum PublisherKeyType {
    INTERNAL = 0;
    TEST = 1;
    PRODUCTION = 2;
}

// Asset class for exchange classification.
enum ExchangeAssetClass {
    EXCHANGE_ASSET_CLASS_UNSPECIFIED = 0;
    EXCHANGE_ASSET_CLASS_EQUITY = 1;
    EXCHANGE_ASSET_CLASS_FUTURE = 2;
}

// Asset subclass for exchange classification.
enum ExchangeAssetSubclass {
    EXCHANGE_ASSET_SUBCLASS_UNSPECIFIED = 0;
    EXCHANGE_ASSET_SUBCLASS_COMMON_STOCK = 1;
    EXCHANGE_ASSET_SUBCLASS_ETF = 2;
    EXCHANGE_ASSET_SUBCLASS_ENERGY = 3;
    EXCHANGE_ASSET_SUBCLASS_METALS = 4;
    EXCHANGE_ASSET_SUBCLASS_EQUITY = 5;
    EXCHANGE_ASSET_SUBCLASS_FIXED_INCOME = 6;
    EXCHANGE_ASSET_SUBCLASS_FX = 7;
    EXCHANGE_ASSET_SUBCLASS_AGRICULTURAL = 8;
}

// Asset sector for exchange classification.
enum ExchangeAssetSector {
    EXCHANGE_ASSET_SECTOR_UNSPECIFIED = 0;
    EXCHANGE_ASSET_SECTOR_TECHNOLOGY = 1;
    EXCHANGE_ASSET_SECTOR_FINANCIALS = 2;
    EXCHANGE_ASSET_SECTOR_BROAD_MARKET = 3;
    EXCHANGE_ASSET_SECTOR_OIL = 4;
    EXCHANGE_ASSET_SECTOR_METALS = 5;
    EXCHANGE_ASSET_SECTOR_INDEX = 6;
    EXCHANGE_ASSET_SECTOR_RATES = 7;
    EXCHANGE_ASSET_SECTOR_FX = 8;
    EXCHANGE_ASSET_SECTOR_AGRICULTURAL = 9;
}

// Market schedule configuration for a session on an exchange.
message ExchangeSessionConfig {
    // [required] Which session this applies to.
    optional MarketSession session = 1;
    // [required] Market schedule in Pythnet format (timezone;weekly;holidays).
    optional string market_schedule = 2;
}

enum CorporateActionKind {
    CORPORATE_ACTION_KIND_UNSPECIFIED = 0;
    SPLIT = 1;
    REVERSE_SPLIT = 2;
}

message UsEquityExDate {
    // [required] Ex-date in YYYY-MM-DD format.
    optional string ex_date = 1;
}

message CorporateActionActivation {
    // [required]
    oneof condition {
        UsEquityExDate us_equity_ex_date = 1;
    }
}

message CorporateAction {
    // [required]
    optional CorporateActionKind event_type = 1;
    // [required]
    optional CorporateActionActivation activation = 2;
    // [required for split/reverse_split]
    optional uint64 adjustment_factor_numerator = 3;
    // [required for split/reverse_split]
    optional uint64 adjustment_factor_denominator = 4;
    // [optional] Defaults to 1000 bips (10%) if not set.
    optional uint64 rejection_threshold_bips = 5;
    // [optional] Defaults to 43200 seconds (12h) if not set.
    optional google.protobuf.Duration rejection_window = 6;
}

// Configuration for filtering stale publisher prices when a market session begins.
// When a session starts, publishers whose price has not moved beyond the threshold
// for longer than the staleness duration are excluded from aggregation
// during the initial window of the session.
message StalePriceFilterConfig {
    // [optional] Duration (seconds) after session start during which stale publisher
    // prices are excluded from aggregation.
    optional uint32 window_secs = 1;
    // [optional] Price movement threshold in parts per million (PPM).
    // Publishers whose price has not moved by at least this amount are considered stale.
    optional uint64 moved_price_threshold_ppm = 2;
    // [optional] Duration (seconds) a publisher price must be non-moving to be
    // considered stale.
    optional uint32 staleness_threshold_secs = 3;
}

// Feed-level schedule overrides for modifying an inherited exchange schedule.
message ScheduleOverrides {
    // Holiday overrides using the same "MMDD/kind" format as the schedule string.
    // Each entry replaces any exchange holiday on the same date, or is appended if new.
    // Use "MMDD/O" to effectively remove an exchange holiday.
    // Use "MMDD/C" to add a closure.
    // Use "MMDD/0930-1300" to set custom hours for that date.
    repeated string holiday_overrides = 1;
}

// A list of benchmark identifiers for a single category within a market session.
message BenchmarkIdentifiers {
    repeated BenchmarkIdentifier identifiers = 1;
}

// A single benchmark identifier with an optional validity period.
message BenchmarkIdentifier {
    // [required] The identifier string
    optional string identifier = 1;
    // [optional] Start of validity period. If absent, valid from the beginning of time.
    optional google.protobuf.Timestamp valid_from = 2;
    // [optional] End of validity period. If absent, valid indefinitely.
    optional google.protobuf.Timestamp valid_to = 3;
}

message FeedMarketSchedule {
    // [required] Which session this applies to
    optional MarketSession session = 1;
    // [optional] Numeric value. If not set, minimum publishers from the feed level apply
    optional int32 min_publishers = 2;
    // [conditionally required] Market schedule in Pythnet format.
    // Required when the feed does not inherit from an exchange for this session.
    // When omitted and the feed has exchange_id set, the schedule is inherited from
    // the exchange's matching session.
    optional string market_schedule = 3;
    // [required] The list of publisher IDs allowed to publish for this market schedule
    repeated uint32 allowed_publisher_ids = 4;
    // [optional] Benchmark mappings keyed by category
    // Each category maps to a list of identifiers with optional validity periods.
    map<string, BenchmarkIdentifiers> benchmark_mapping = 5;
    // [optional] Feed-level modifications to the inherited exchange schedule.
    // Only applies when market_schedule is absent (i.e. the schedule is inherited).
    // Ignored when an explicit market_schedule is set.
    optional ScheduleOverrides schedule_overrides = 6;
    // [optional] Configuration for filtering stale publisher prices at session start.
    optional StalePriceFilterConfig stale_price_filter = 7;
}

// A single set of multisig keys.
message MultisigKeys {
    // [required] Key set index. Monotonically increasing, incremented by 1 on each upgrade.
    optional uint32 guardian_set_index = 1;
    // Multisig keys. Each key is a 20-byte Ethereum-style address
    // (last 20 bytes of keccak256 of the ECDSA secp256k1 public key).
    repeated bytes keys = 2;
}

// Container for the current and (optionally) next multisig key set.
// At most two key sets are valid at any time: the current one, and
// the next one if a key set upgrade is in progress.
message MultisigKeySets {
    // [required] The currently active key set.
    optional MultisigKeys current = 1;
    // [optional] The next key set, present only during a key set upgrade.
    optional MultisigKeys next = 2;
}

// Specifies the way governance transactions are signed and verified.
// Note that once added, a governance source cannot be removed.
// The last sequence number associated with this source
// will be retained in the state indefinitely to prevent repeated execution of instructions.
message GovernanceSource {
    // Governance transactions are signed by a single Ed25519 signature.
    // This will generally be used in development and testing groups.
    message SingleEd25519 {
        // [required] Ed25519 public key that signs governance transactions.
        optional bytes public_key = 1;
    }

    message WormholeEmitter {
        // [required] Wormhole emitter address.
        optional bytes address = 1;
        // [required] Wormhole emitter chain ID. Restricted to uint16.
        optional uint32 chain_id = 2;
    }

    // [required]
    oneof source {
        SingleEd25519 single_ed25519 = 1;
        WormholeEmitter wormhole_emitter = 2;
    }
}

// Permissions granted to a governance source.
// bool fields in this message are optional and default to false (no permission).
message Permissions {
    enum ShardAction {
        // Required by protobuf. Instruction will be rejected if this value is encountered.
        SHARD_ACTION_UNSPECIFIED = 0;
        // All operations, including operations added in the future.
        ALL_ACTIONS = 1;
        CREATE_SHARD = 101;
        ADD_GOVERNANCE_SOURCE = 102;
        // All operations under `UpdateGovernanceSource`,
        // including operations added in the future.
        UPDATE_GOVERNANCE_SOURCE = 103;
        SET_SHARD_NAME = 105;
        SET_SHARD_GROUP = 106;
        RESET_LAST_SEQUENCE_NO = 107;
        ADD_PUBLISHER = 108;
        // All operations under `UpdatePublisher`,
        // including operations added in the future.
        UPDATE_PUBLISHER = 109;
        REMOVE_PUBLISHER = 110;
        ADD_FEED = 111;
        // All operations under `UpdateFeed`,
        // including operations added in the future.
        UPDATE_FEED = 112;
        REMOVE_FEED = 113;
        ADD_FEATURE_FLAG = 114;
        REMOVE_FEATURE_FLAG = 115;
        ADD_ASSET = 116;
        // All operations under `UpdateAsset`,
        // including operations added in the future.
        UPDATE_ASSET = 117;
        REMOVE_ASSET = 118;
        SET_MULTISIG_KEYS = 119;
        SCHEDULE_INSTRUCTION = 120;
        UNSCHEDULE_INSTRUCTION = 121;
    }

    enum UpdateGovernanceSourceAction {
        // Required by protobuf. Instruction will be rejected if this value is encountered.
        UPDATE_GOVERNANCE_SOURCE_ACTION_UNSPECIFIED = 0;
        SET_GOVERNANCE_SOURCE_PERMISSIONS = 101;
    }

    enum UpdatePublisherAction {
        // Required by protobuf. Instruction will be rejected if this value is encountered.
        UPDATE_PUBLISHER_ACTION_UNSPECIFIED = 0;
        SET_PUBLISHER_NAME = 101;
        ADD_PUBLISHER_PUBLIC_KEYS = 102;
        REMOVE_PUBLISHER_PUBLIC_KEYS = 103;
        SET_PUBLISHER_PUBLIC_KEYS = 104;
        SET_PUBLISHER_ACTIVE = 105;
        reserved 106, 107, 108;
        reserved "ADD_PUBLISHER_ALLOWED_FEED_IDS", "REMOVE_PUBLISHER_ALLOWED_FEED_IDS", "SET_PUBLISHER_ALLOWED_FEED_IDS";
        SET_PUBLISHER_ACCESS_TOKEN = 109;
        SET_PUBLISHER_KEY_TYPE = 110;
    }

    enum UpdateFeedAction {
        // Required by protobuf. Instruction will be rejected if this value is encountered.
        UPDATE_FEED_ACTION_UNSPECIFIED = 0;
        UPDATE_FEED_PROPERTIES = 101;
        UPDATE_FEED_METADATA = 102;
        ENABLE_FEED_IN_SHARD = 103;
        DISABLE_FEED_IN_SHARD = 104;
    }

    enum UpdateAssetAction {
        // Required by protobuf. Instruction will be rejected if this value is encountered.
        UPDATE_ASSET_ACTION_UNSPECIFIED = 0;
        UPDATE_ASSET_METADATA = 101;
    }

    repeated ShardAction actions = 1;
    repeated UpdateGovernanceSourceAction update_governance_source_actions = 2;
    repeated UpdatePublisherAction update_publisher_actions = 3;
    repeated UpdateFeedAction update_feed_actions = 4;
    repeated UpdateAssetAction update_asset_actions = 5;
}
