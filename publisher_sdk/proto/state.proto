syntax = "proto3";
package pyth_lazer;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

import "dynamic_value.proto";
import "types.proto";
import "governance_instruction.proto";


// All optional fields should always be set unless documented otherwise.

// State of a Pyth Lazer shard.
//
// The state is shared across all Pyth Lazer aggregators that process this shard.
// All aggregators should observe the same state at any `last_sequence_no`.
// The state contains all the information necessary for processing the updates.
// The aggregators cannot rely on any external data, except the state and the update sequence.
// A snapshot of the state includes the serialized `State` value as the payload.
message State {
    // [required] ID of this shard. Each state value only accounts for data of a particular shard.
    optional uint32 shard_id = 1;
    // [required] sequence_no of the last update applied to the state.
    optional uint64 last_sequence_no = 2;
    // [required] Timestamp of the last update provided by Kafka/Nats.
    // If no updates were applied, contains the timestamp of genesis snapshot creation time.
    optional google.protobuf.Timestamp last_timestamp = 3;
    // [required] Shard name. Must be unique. Used for governance instruction targeting and
    // for logs, metrics, etc. Example: "shard1.tokyo.staging.pyth-lazer"
    optional string shard_name = 4;
    // [required] Shard group name. Used for governance instruction targeting.
    // Example: "tokyo.staging.pyth-lazer"
    optional string shard_group = 5;
    // [required] Minimal aggregation rate allowed in this shard.
    optional google.protobuf.Duration min_rate = 6;
    // List of feeds.
    repeated Feed feeds = 7;
    // List of publishers.
    repeated Publisher publishers = 8;
    // List of governance sources.
    repeated GovernanceSourceState governance_sources = 9;
    // Currently active feature flags. Feature flags influence the aggregator's behavior.
    repeated string feature_flags = 10;
    // List of assets.
    repeated Asset assets = 11;
    // Multisig key sets (current + optional next during upgrade).
    optional MultisigKeySets multisig_key_sets = 12;
    // List of exchanges.
    repeated ExchangeClassificationSchedule exchanges = 13;
    // Scheduled governance actions pending execution.
    repeated ScheduledGovernanceAction scheduled_actions = 14;
}

// An item of the state describing a publisher.
message Publisher {
    // [required] Publisher ID. Restricted to uint16.
    optional uint32 publisher_id = 1;
    // [required] Publisher name (only for debug/monitoring/management purposes). Must be unique.
    optional string name = 2;
    // Public keys used to sign publisher update transactions.
    repeated bytes public_keys = 3;
    // [required] If true, the publisher is active, i.e. it's allowed to publish updates.
    optional bool is_active = 4;
    reserved 5;
    reserved "allowed_feed_ids";
    // Publisher access token configuration. Will become required in the future.
    optional PublisherAccessToken access_token = 6;
    // Publisher key type. Will become required in the future.
    optional PublisherKeyType key_type = 7;
}

// An item of the state describing an exchange (trading venue).
// Together, (exchange, asset_class, asset_subclass, asset_sector) uniquely
// determines the schedule a feed should follow.
message ExchangeClassificationSchedule {
    // [required] ID of the exchange.
    optional uint32 exchange_id = 1;
    // [required] Human-readable name, e.g. "NASDAQ", "CME", "Binance".
    optional string name = 2;
    // [optional] Additional metadata values (region, mic_code, etc.).
    optional DynamicValue.Map metadata = 3;
    // [optional] Asset class for this exchange entry.
    optional ExchangeAssetClass asset_class = 4;
    // [optional] Asset subclass for this exchange entry.
    optional ExchangeAssetSubclass asset_subclass = 5;
    // [optional] Asset sector for this exchange entry.
    optional ExchangeAssetSector asset_sector = 6;
    // Schedule templates for this exchange combination.
    repeated ExchangeSessionConfig sessions = 7;

    // Field 8 was a removed `asset_class_2` (feature reverted, never enabled).
    reserved 8;
    reserved "asset_class_2";
}

message CorporateActionAdjustmentData {
    // [optional] The price_impact_start of the timing this adjustment belongs to (microseconds since epoch)
    optional uint64 price_impact_start = 1;
    // [optional] Pre-adjustment price for the currently active corporate action requiring adjustment, if any
    optional int64 pre_adjustment_price = 2;
}

message StalenessStorageData {
    // [optional] End timestamp of the current stale-price filtering window.
    // Absent when no window is active.
    optional google.protobuf.Timestamp stale_window_end = 1;
}

// An item of the state describing a feed.
message Feed {
    // [required] ID of the feed.
    optional uint32 feed_id = 1;
    // Additional state per publisher.
    // If an eligible publisher is not listed here, the corresponding state should be considered empty.
    repeated FeedPublisherState per_publisher = 2;
    // [required] Additional metadata values. These values will be exposed in the APIs, but
    // are not directly used in the aggregator.
    optional DynamicValue.Map metadata = 3;

    // [required] A unique string identifier of the feed that captures all the information related to the feed.
    // Used for logs, metrics, feed search API, TradingView API.
    optional string symbol = 101;
    // [required] Exponent applied to all price and rate values for this feed.
    // Actual value is `mantissa * 10 ^ exponent`.
    // Restricted to int16.
    optional sint32 exponent = 102;
    // [required] Minimal number of publisher prices required to produce an aggregate.
    optional uint32 min_publishers = 103;
    // [required] Minimal channel of aggregation performed by the aggregator for this feed.
    // Cannot be lower than the shard's top level `State.min_rate`.
    optional Channel min_channel = 104;
    // [required] Time after which the publisher update is discarded.
    optional google.protobuf.Duration expiry_time = 105;
    reserved 106;
    reserved "market_schedule";
    // [required] Feed state.
    optional FeedState state = 107;
    // [required] Feed kind.
    optional FeedKind kind = 108;
    // [required] Current aggregated data of the feed.
    optional FeedAggregateData aggregated_data = 109;
    // [optional] List of Market schedules for different sessions
    // Overrides market_schedule field if set
    repeated FeedMarketSchedule market_schedules = 110;
    // [optional] Reference to an exchange. When set, the feed can inherit
    // market session schedules from the exchange.
    optional uint32 exchange_id = 111;
    // [optional] Indicates whether the last aggregated data is fresh.
    optional bool is_aggregated_data_fresh = 112;
    // [optional] Active corporate actions for this feed.
    repeated CorporateAction corporate_actions = 113;

    // [required] Feed status in the current shard. Disabled feeds will not be visible in
    // the consumer API for the current shard. This setting should only be used
    // to migrate a feed from one shard to another.
    //
    // If a feed is present in
    // multiple shards, it must only be active in one of them at each time.
    // To enforce this, `enable_in_shard_timestamp` and `disable_in_shard_timestamp` fields
    // can be used to deactivate a feed in one shard and activate it in another shard
    // at the same instant.
    optional bool is_enabled_in_shard = 201;
    // [optional] If present, the aggregator will enable the feed in the current shard
    // at the specified instant.
    optional google.protobuf.Timestamp enable_in_shard_timestamp = 202;
    // [optional] If present, the aggregator will disable the feed in the current shard
    // at the specified instant.
    optional google.protobuf.Timestamp disable_in_shard_timestamp = 203;
    // [optional] Accumulated data for EMA (exponential moving average) price.
    optional EmaStorage ema_price_storage = 204;
    // [optional] Accumulated data for EMA confidence interval.
    optional EmaStorage ema_confidence_storage = 205;
    // [optional] Coroporate actions adjustment data
    optional CorporateActionAdjustmentData corporate_actions_adjustment_data = 206;
    // [optional] Whether a new aggregate needs to be calculated because one of the inputs has changed.
    optional bool pending_aggregation = 207;
    // [optional] Per-publisher snapshot of the latest price update where the price moved
    // beyond the configured basis-point threshold relative to the previous moved price.
    repeated FeedPublisherState publisher_latest_moved_price = 208;
    // [optional] Persisted staleness window state for stale-price filtering.
    optional StalenessStorageData staleness_storage_data = 209;
}

// [optional] Accumulated data for EMA (exponential moving average) price or confidence interval.
message EmaStorage {
    // [required] Numerator of the current EMA value.
    optional int64 numerator = 1;
    // [required] Denominator of the current EMA value.
    optional int64 denominator = 2;
    // [required] Last timestamp of EMA update.
    optional google.protobuf.Timestamp previous_timestamp = 3;
}

// A part of the feed state related to a particular publisher.
message FeedPublisherState {
    // [required] Publisher ID. Restricted to uint16.
    optional uint32 publisher_id = 1;
    // [optional] Timestamp of the last update received from this publisher to this feed.
    // This timestamp is provided by Nats/Kafka, not by publisher.
    // Can be absent if no update was ever received or if the last update was deemed no longer relevant.
    optional google.protobuf.Timestamp last_update_timestamp = 2;
    // [optional] Publisher timestamp of the last update received from this publisher to this feed.
    // This timestamp is provided by publisher.
    // Can be absent if no update was ever received or if the last update was deemed no longer relevant.
    optional google.protobuf.Timestamp last_publisher_timestamp = 3;
    // [optional] Data of the last update received from this publisher to this feed.
    // Can be absent if no update was ever received or if the last update was deemed no longer relevant.
    optional FeedPublisherData last_feed_data = 4;
}

// Data provided by a publisher for a certain feed.
message FeedPublisherData {
    // [optional] Best executable price. Can be absent if no data is available. Never present for funding rate feeds.
    optional int64 price = 1;
    // [optional] Best bid price. Can be absent if no data is available. Never present for funding rate feeds.
    optional int64 best_bid_price = 2;
    // [optional] Best ask price. Can be absent if no data is available. Never present for funding rate feeds.
    optional int64 best_ask_price = 3;
    // [optional] Funding rate. Can be absent if no data is available. Can only be present for funding rate feeds.
    optional int64 funding_rate = 4;
    // [optional] Funding rate interval. Can be absent if no data is available. Can only be present for funding rate feeds.
    optional google.protobuf.Duration funding_rate_interval = 5;
    // [required] Timestamp provided by the source of data that the publisher uses (e.g. an exchange).
    // If no such timestamp is available, it should be set to the same value as `publisher_timestamp`.
    optional google.protobuf.Timestamp source_timestamp = 6;
    // [required] Timestamp of the publisher.
    optional google.protobuf.Timestamp publisher_timestamp = 7;
    // [optional] Trading status. Can be absent if no data is available. Never present for funding rate feeds.
    optional TradingStatus trading_status = 8;
    // [optional] Market session. Can be absent if no data is available. Never present for funding rate feeds.
    optional MarketSession market_session = 9;
}

// Aggregate data derived from all accepted publisher updates.
message FeedAggregateData {
    // [optional] For price feeds: best executable price.
    // For funding rates: funding price.
    // Can be absent if no data is available.
    optional int64 price = 1;
    // [optional] Best bid price. Can be absent if no data is available. Never present for funding rate feeds.
    optional int64 best_bid_price = 2;
    // [optional] Best ask price. Can be absent if no data is available. Never present for funding rate feeds.
    optional int64 best_ask_price = 3;
    // [optional] Funding rate. Can be absent if no data is available. Can only be present for funding rate feeds.
    optional int64 funding_rate = 4;
    // [optional] Funding rate interval. Can be absent if no data is available. Can only be present for funding rate feeds.
    optional google.protobuf.Duration funding_rate_interval = 5;
    // [optional] Timestamp of the funding. Can be absent if no data is available.
    // Can only be present for funding rate feeds.
    optional google.protobuf.Timestamp funding_timestamp = 6;
    // [required] Number of publishers that were included in the aggregate.
    optional uint64 publisher_count = 7;
    // [optional] Confidence interval for the `price` field. Can be absent if no data is available.
    // Never present for funding rate feeds.
    optional int64 confidence = 8;
    // [required] Exponent applied to all price and rate values for this feed.
    // Actual value is `mantissa * 10 ^ exponent`.
    // Restricted to int16.
    optional int32 exponent = 9;
    // [required] Market session for the feed.
    optional MarketSession market_session = 10;
    // [optional] EMA (exponential moving average) price. Can be absent if no data is available.
    // Never present for funding rate feeds.
    optional int64 ema_price = 11;
    // [optional] EMA confidence interval. Can be absent if no data is available.
    // Never present for funding rate feeds.
    optional int64 ema_confidence = 12;
    // [optional] Timestamp of the latest feed update. Can be absent if no data is available.
    optional google.protobuf.Timestamp feed_update_timestamp = 13;
    // Publisher IDs that contributed to this aggregate. Same order as publisher_data.
    repeated uint32 publisher_ids = 14;
    // Per-publisher data: price mantissas for price feeds, rate mantissas for funding rate feeds (same order as publisher_ids).
    repeated int64 publisher_data = 15;
}

// An item of the state describing an asset.
message Asset {
    // [required] ID of the asset.
    optional uint32 asset_id = 1;
    // [required] Additional metadata values. These values will be exposed in the APIs.
    optional DynamicValue.Map metadata = 2;
}

// State associated with a governance source.
message GovernanceSourceState {
    // [required]
    optional GovernanceSource source = 1;
    // [required]
    optional Permissions permissions = 2;
    // [required]
    optional uint64 last_sequence_no = 3;
}
