[workspace.dependencies.pyth-lazer-client]
path = "sdk/rust/client"
version = "26.4.0"

[workspace.dependencies.pyth-lazer-protocol]
path = "sdk/rust/protocol"
version = "0.45.0"

[workspace.dependencies.pyth-lazer-publisher-sdk]
path = "publisher_sdk/rust"
version = "0.45.0"

[workspace.dependencies.async-stripe-core]
features = ["customer"]
version = "=1.0.0-rc.6"

[workspace.dependencies.async-stripe-misc]
features = ["entitlements_active_entitlement", "entitlements_feature"]
version = "=1.0.0-rc.6"

[workspace.dependencies.axum]
features = ["ws"]
version = "0.8.1"

[workspace.dependencies.axum-extra]
features = ["multipart", "query"]
version = "0.10.1"

[workspace.dependencies.axum-streams]
features = ["json", "text"]
version = "0.20.0"

[workspace.dependencies.backoff]
features = ["futures", "tokio"]
version = "0.4.0"

[workspace.dependencies.bincode]
features = ["serde"]
version = "2.0.1"

[workspace.dependencies.bip39]
features = ["rand"]
version = "2.1.0"

[workspace.dependencies.bytes]
features = ["serde"]
version = "1.10.1"

[workspace.dependencies.cached]
features = ["async"]
version = "0.56.0"

[workspace.dependencies.chrono]
features = ["serde"]
version = "0.4.41"

[workspace.dependencies.chrono-tz]
features = ["serde"]
version = "0.10.3"

[workspace.dependencies.clap]
features = ["derive"]
version = "4.5.32"

[workspace.dependencies.clickhouse]
features = ["inserter", "native-tls", "uuid"]
version = "0.13.2"

[workspace.dependencies.criterion]
default-features = false
features = ["cargo_bench_support"]
version = "0.5"

[workspace.dependencies.derive_more]
features = ["full"]
version = "2.0.1"

[workspace.dependencies.ed25519-dalek]
features = ["rand_core"]
version = "2.1.1"

[workspace.dependencies.hex]
features = ["serde"]
version = "0.4.3"

[workspace.dependencies.hyper]
features = ["http1", "server"]
version = "1.6.0"

[workspace.dependencies.hyper-util]
features = ["tokio"]
version = "0.1.10"

[workspace.dependencies.insta]
features = ["yaml"]
version = "1.41"

[workspace.dependencies.k256]
features = ["ecdsa"]
version = "0.13.4"

[workspace.dependencies.moka]
features = ["future"]
version = "0.12.15"

[workspace.dependencies.opentelemetry-otlp]
features = ["grpc-tonic"]
version = "0.28.0"

[workspace.dependencies.opentelemetry_sdk]
features = ["rt-tokio"]
version = "0.28.0"

[workspace.dependencies.polars]
default-features = false
version = "0.51.0"

[workspace.dependencies.rdkafka]
version = "0.37.0"

[workspace.dependencies.reqwest]
default-features = false
features = [
  "charset",
  "http2",
  "json",
  "multipart",
  "rustls-tls",
  "system-proxy",
]
version = "0.12.23"

[workspace.dependencies.rust_decimal]
features = ["serde-with-str"]
version = "1.36.0"

[workspace.dependencies.serde]
features = ["derive"]
version = "1.0.219"

[workspace.dependencies.serde_with]
features = ["base64"]
version = "3.10.0"

[workspace.dependencies.serde_wormhole]
git = "https://github.com/wormhole-foundation/wormhole"
tag = "v2.17.1"

[workspace.dependencies.signature]
features = ["rand_core"]
version = "2.2.0"

[workspace.dependencies.soketto]
features = ["http"]
version = "0.8.1"

[workspace.dependencies.strum]
features = ["derive"]
version = "0.27.2"

[workspace.dependencies.syn]
features = ["full"]
version = "2.0"

[workspace.dependencies.time]
features = ["macros", "serde-human-readable", "serde-well-known"]
version = "0.3"

[workspace.dependencies.tinystr]
features = ["serde"]
version = "0.8"

[workspace.dependencies.tokio]
features = ["full"]
version = "1.44.1"

[workspace.dependencies.tokio-tungstenite]
features = ["native-tls", "url"]
version = "0.26.2"

[workspace.dependencies.tokio-util]
features = ["compat"]
version = "0.7.14"

[workspace.dependencies.tonic]
features = ["router", "transport"]
version = "0.14.5"

[workspace.dependencies.tower-http]
features = ["cors", "trace"]
version = "0.6.1"

[workspace.dependencies.tracing-subscriber]
features = ["env-filter", "json"]
version = "0.3.23"

[workspace.dependencies.url]
features = ["serde"]
version = "2.5.4"

[workspace.dependencies.utoipa]
features = ["axum_extras", "chrono", "decimal", "non_strict_integers", "uuid"]
version = "5.4.0"

[workspace.dependencies.utoipa-redoc]
features = ["axum"]
version = "6"

[workspace.dependencies.utoipa-swagger-ui]
features = ["axum"]
version = "9.0.0"

[workspace.dependencies.uuid]
features = ["serde", "v4"]
version = "1"

[workspace.dependencies.winnow]
version = "0.7.6"

[workspace.dependencies.wormhole-sdk]
git = "https://github.com/wormhole-foundation/wormhole"
tag = "v2.17.1"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
wildcard_dependencies = "deny"
collapsible_if = "allow"
collapsible_else_if = "allow"
allow_attributes_without_reason = "warn"
expect_used = "warn"
fallible_impl_from = "warn"
indexing_slicing = "warn"
panic = "warn"
panic_in_result_fn = "warn"
string_slice = "warn"
todo = "warn"
unchecked_duration_subtraction = "warn"
unreachable = "warn"
unwrap_in_result = "warn"
unwrap_used = "warn"
cast_lossless = "warn"
cast_possible_truncation = "warn"
cast_possible_wrap = "warn"
cast_sign_loss = "warn"
collection_is_never_read = "warn"
match_wild_err_arm = "warn"
path_buf_push_overwrite = "warn"
read_zero_byte_vec = "warn"
same_name_method = "warn"
suspicious_operation_groupings = "warn"
suspicious_xor_used_as_pow = "warn"
unused_self = "warn"
used_underscore_binding = "warn"
while_float = "warn"
